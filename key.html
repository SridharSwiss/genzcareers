    {h:"The Power of Broad Thinking",p:"Look past the raw current reality of a situation to visualize its future exponential potential. <b>Takeaway Analysis:</b> See what things can become. Value a business, a property, or a human being based on their potential for expansion."},
    {h:"The Habit of Supreme Initiative",p:"High-value leaders do not wait for explicit instructions; they see a need and execute immediately. <b>Takeaway Analysis:</b> Be the first to act. Build a personal reputation for high initiative to automatically rise inside any ecosystem."},
    {h:"Turn Setbacks into Useful Data",p:"An investment loss or career failure is not a personal verdict; it is an integrated cost of education. <b>Takeaway Analysis:</b> Perform a cold review of your mistakes. Extract the key lesson learned and recalibrate your system instantly."},
    {h:"Use Goals as Growth Engines",p:"A clear, written, dated goal focuses all your subconscious faculties toward one target. <b>Takeaway Analysis:</b> Set major milestones across health, wealth, and social impact. Let your targets pull you out of daily distraction loops."}
  ],sig:"Think big and you will live big."},

  {n:47,title:"Feeling Is the Secret",author:"Neville Goddard",year:"1944",cat:"Mindset & Manifestation",
  core:"The subconscious mind is completely unswayed by cold logic; it can only be programmed by deep, intensely felt emotions.",
  concepts:[
    {h:"The Core Dynamic of Mind",p:"The conscious mind impresses ideas; the subconscious expresses them. The subconscious alters your physical reality. <b>Takeaway Analysis:</b> Control your mental diet. Never allow negative suggestions to linger in your mind, as the subconscious accepts them as commands."},
    {h:"The Mastery of the Feeling State",p:"Manifestation requires you to assume the precise emotional state of your desire already fulfilled before it appears. <b>Takeaway Analysis:</b> Do not wait to see results to feel successful. Live in the absolute feeling of victory today to prime your field."},
    {h:"The Twilight Programming Portal",p:"The borderland state exactly between wakefulness and sleep is the absolute easiest window to program the subconscious. <b>Takeaway Analysis:</b> As you drift off, visualize your ultimate success and feel its joy deeply. Do not fall asleep scrolling on social media."},
    {h:"The Subconscious is the Womb",p:"All material creation is born from the subconscious mind processing your internal emotional inputs. <b>Takeaway Analysis:</b> Protect your subconscious from toxic programming. Feed it visions of strength, prosperity, and peace with intensity."},
    {h:"The Fallacy of Cold Logic",p:"The universe does not care about your intellectual explanations; it responds exclusively to your true energetic frequency. <b>Takeaway Analysis:</b> Stop trying to reason your way to success. Elevate your emotional frequency to unlock alignment with prosperity loops."},
    {h:"The Power of Inner Speech",p:"The quiet conversations you have with yourself across the day form your character and environment. <b>Takeaway Analysis:</b> Keep your inner chatter positive and focused. Speak to yourself like a high-value champion, even in moments of friction."},

const stage = document.getElementById('stage');
const counter = document.getElementById('counter');
const pfill = document.getElementById('pfill');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
let idx = 0;

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(){
  const b = BOOKS[idx];
  const num = String(b.n).padStart(2,'0');
  
  const conceptsHTML = b.concepts.map((c,i)=>`
    <li style="animation-delay:${0.15 + i*0.06}s">
      <span class="mk">◆</span>
      <div>
        <h4>${esc(c.h)}</h4>
        <p>${c.p}</p>
      </div>
    </li>`).join('');

  stage.innerHTML = `
    <div class="book">
      <aside class="book-left">
        <div class="emblem">
          <div class="ring"></div>
          <div class="ring spin"></div>
          <div class="ring r2"></div>
          <div class="bignum">${num}</div>
        </div>
        <div class="cat">${esc(b.cat)}</div>
      </aside>
      <div class="book-main">
        <h1 class="b-title">${esc(b.title)}</h1>
        <div class="b-meta"><b>${esc(b.author)}</b> &nbsp;·&nbsp; ${b.year}</div>
        <div class="core">
          <span class="lbl">Strategic Core</span>
          <p>${esc(b.core)}</p>
        </div>
        <ul class="concepts">${conceptsHTML}</ul>
        <div class="signature" style="animation-delay:${0.2 + b.concepts.length*0.06}s">
          <span class="lbl">Foundational Principle</span>
          <p>“${esc(b.sig)}”</p>
        </div>
      </div>
    </div>`;

  counter.innerHTML = `<b>${num}</b> / 50`;
  pfill.style.width = ((b.n)/50*100)+'%';
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === BOOKS.length - 1;
  
  // Smooth scroll container to top
  document.querySelector('main').scrollTop = 0;
  updateGridActive();
}

function go(d){ 
  const t = idx + d; 
  if(t >= 0 && t < BOOKS.length){ idx = t; render(); } 
}

function jump(i){ 
  idx = i; 
  render(); 
  closeOverlay(); 
}

prevBtn.onclick = () => go(-1);
nextBtn.onclick = () => go(1);

addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') go(1);
  else if(e.key === 'ArrowLeft') go(-1);
  else if(e.key === 'Escape') closeOverlay();
});

// Touch swipe implementation
let tx = 0;
addEventListener('touchstart', e => tx = e.changedTouches[0].clientX, {passive:true});
addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx; 
  if(Math.abs(dx) > 60) go(dx < 0 ? 1 : -1);
}, {passive:true});

// Overlay indexing mechanism
const overlay = document.getElementById('overlay');
const grid = document.getElementById('grid');

grid.innerHTML = BOOKS.map((b,i)=>`
  <button class="gcard" data-i="${i}">
    <span class="gn">${String(b.n).padStart(2,'0')}</span>
    <span class="gt">${esc(b.title)}<span class="ga">${esc(b.author)}</span></span>
  </button>`).join('');

grid.querySelectorAll('.gcard').forEach(c => c.onclick = () => jump(+c.dataset.i));

function updateGridActive(){
  grid.querySelectorAll('.gcard').forEach((c,i) => c.classList.toggle('active', i === idx));
}

document.getElementById('contentsBtn').onclick = () => {
  overlay.classList.add('open');
  updateGridActive();
};

document.getElementById('closeOv').onclick = closeOverlay;
function closeOverlay(){ overlay.classList.remove('open'); }

// Dynamic Starfield Logic
(function(){
  const el = document.querySelector('.stars'); 
  let sh = [];
  for(let i=0; i<140; i++){
    sh.push(`${Math.floor(Math.random()*2000)}px ${Math.floor(Math.random()*2000)}px rgba(246,227,168,${0.25 + Math.random()*0.65})`);
  }
  const s = document.createElement('div');
  s.style.cssText = `position:absolute;width:1.2px;height:1.2px;border-radius:50%;box-shadow:${sh.join(',')};animation:fl 120s linear infinite`;
  const s2 = s.cloneNode(); 
  s2.style.top = '2000px';
  const st = document.createElement('style');
  st.textContent = '@keyframes fl{from{transform:translateY(0)}to{transform:translateY(-2000px)}}';
  document.head.appendChild(st);
  el.appendChild(s); 
  el.appendChild(s2);
})();

// Initialize Application Engine
render();
</script>
</body>
</html>
