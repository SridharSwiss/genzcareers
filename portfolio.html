<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SridharSwiss | Ultra-Minimal Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #a855f7;
            --bg-deep: #020617;
            --sidebar-hidden: 4px; /* Total minimization */
            --sidebar-visible: 280px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            margin: 0;
            overflow: hidden;
            display: flex;
        }

        /* --- THE GHOST SIDEBAR --- */
        #sidebar {
            width: var(--sidebar-hidden);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease;
            background: rgba(168, 85, 247, 0.1); /* Subtle hint line */
            backdrop-filter: blur(20px);
            z-index: 1000;
            overflow-x: hidden;
            border-right: 1px solid rgba(168, 85, 247, 0.2);
        }

        #sidebar:hover {
            width: var(--sidebar-visible);
            background: rgba(15, 23, 42, 0.98);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Content inside sidebar - hidden until hover */
        .sidebar-content {
            opacity: 0;
            transition: opacity 0.2s ease;
            width: var(--sidebar-visible);
            padding: 2rem 1.5rem;
        }

        #sidebar:hover .sidebar-content {
            opacity: 1;
        }

        /* --- MAIN STAGE (FULL SCREEN) --- */
        main {
            flex-grow: 1;
            height: 100vh;
            margin-left: var(--sidebar-hidden);
            background: #000;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        iframe.loaded {
            opacity: 1;
        }

        /* Navigation Styling */
        .nav-group { margin-bottom: 2rem; }
        .nav-label { font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; display: block; }
        .nav-item {
            display: block;
            padding: 0.6rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.875rem;
            border-radius: 8px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav-item:hover { background: rgba(168, 85, 247, 0.1); color: white; transform: translateX(5px); }

        .gradient-text {
            background: linear-gradient(135deg, #c084fc 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-content">
            <h1 class="text-white text-xl font-black mb-8 italic tracking-tighter">SRIDHAR<span class="text-purple-500">.</span></h1>
            
            <nav>
                <div class="nav-group">
                    <span class="nav-label">GenZ Careers</span>
                    <a href="https://sridharswiss.github.io/genzcareers/future.html" target="view" class="nav-item">Future Careers</a>
                    <a href="https://sridharswiss.github.io/genzcareers/future2030.html" target="view" class="nav-item">Horizon 2030</a>
                    <a href="https://sridharswiss.github.io/genzcareers/aibubble.html" target="view" class="nav-item">AI Bubble</a>
                    <a href="https://sridharswiss.github.io/genzcareers/quantumtech.html" target="view" class="nav-item">Quantum Tech</a>
                    <a href="https://sridharswiss.github.io/genzcareers/growth.html" target="view" class="nav-item">Growth Sectors</a>
                </div>

                <div class="nav-group">
                    <span class="nav-label">Analytics</span>
                    <a href="https://sridharswiss.github.io/genzcareers/TextAnalytics.html" target="view" class="nav-item">Text Analytics</a>
                    <a href="https://sridharswiss.github.io/IPL/IPL_Analytics.html" target="view" class="nav-item">IPL Data</a>
                </div>

                <div class="nav-group">
                    <span class="nav-label">Swiss Intelligence</span>
                    <a href="https://sridharswiss.github.io/swiss-info/pension.html" target="view" class="nav-item">Pillar Pension</a>
                    <a href="https://sridharswiss.github.io/swiss-info/swiss-edu.html" target="view" class="nav-item">Zurich Edu</a>
                    <a href="https://sridharswiss.github.io/RI/EU_AI_ACT.html" target="view" class="nav-item">EU AI Act</a>
                </div>
                
                <div class="nav-group">
                    <span class="nav-label">Heritage</span>
                    <a href="https://sridharswiss.github.io/IndianEpics/ramayan.html" target="view" class="nav-item">Ramayana</a>
                </div>
            </nav>
        </div>
    </aside>

    <main>
        <div id="welcome" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 z-0">
            <h2 class="text-5xl font-black text-white tracking-tighter italic mb-2">MATRIX <span class="gradient-text">HUB</span></h2>
            <p class="text-slate-500 text-xs font-mono uppercase tracking-[0.3em]">Hover Left Edge to Navigate</p>
        </div>

        <iframe name="view" id="content-frame"></iframe>
    </main>

    <script>
        const frame = document.getElementById('content-frame');
        const welcome = document.getElementById('welcome');
        const navItems = document.querySelectorAll('.nav-item');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                welcome.style.opacity = '0';
                setTimeout(() => welcome.style.display = 'none', 500);
                frame.classList.remove('loaded');
            });
        });

        frame.onload = () => {
            frame.classList.add('loaded');
        };
    </script>
</body>
</html>
