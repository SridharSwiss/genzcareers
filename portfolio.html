<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SridharSwiss | Precision Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #a855f7;
            --bg-deep: #020617;
            --sidebar-w: 280px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            margin: 0;
            overflow: hidden;
            display: flex;
        }

        /* --- THE DYNAMIC SIDEBAR --- */
        #sidebar {
            width: 0; /* Fully collapsed by default */
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1000;
            overflow: hidden;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        #sidebar.expanded {
            width: var(--sidebar-w);
        }

        /* --- THE PRECISION TOGGLE BUTTON --- */
        #menu-toggle {
            position: fixed;
            left: 20px;
            top: 20px;
            width: 40px;
            height: 40px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(168, 85, 247, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1100;
            transition: all 0.3s ease;
            color: white;
        }

        #menu-toggle:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
            transform: scale(1.05);
        }

        /* Toggle Icon Animation */
        .hamburger-line {
            width: 18px;
            height: 2px;
            background-color: white;
            display: block;
            margin: 3px 0;
            transition: 0.3s;
        }

        .expanded #menu-toggle .line1 { transform: rotate(-45deg) translate(-4px, 4px); }
        .expanded #menu-toggle .line2 { opacity: 0; }
        .expanded #menu-toggle .line3 { transform: rotate(45deg) translate(-4px, -4px); }

        /* --- CONTENT AREA --- */
        main {
            flex-grow: 1;
            height: 100vh;
            background: #000;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        iframe.loaded {
            opacity: 1;
        }

        /* Nav Components */
        .sidebar-inner { width: var(--sidebar-w); padding: 80px 24px 24px; }
        .nav-label { font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 0 0.5rem; }
        .nav-item {
            display: block;
            padding: 0.75rem 1rem;
            color: #94a3b8;
            font-size: 0.875rem;
            border-radius: 10px;
            transition: 0.2s;
            margin-bottom: 2px;
        }
        .nav-item:hover { background: rgba(168, 85, 247, 0.1); color: white; }

        .gradient-text {
            background: linear-gradient(135deg, #c084fc 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="menu-toggle" onclick="toggleSidebar()">
        <div>
            <span class="hamburger-line line1"></span>
            <span class="hamburger-line line2"></span>
            <span class="hamburger-line line3"></span>
        </div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-inner">
            <h1 class="text-white text-2xl font-black mb-8 italic tracking-tighter">SRIDHAR<span class="text-purple-500">.</span></h1>
            
            <nav>
                <span class="nav-label">GenZ Careers</span>
                <a href="https://sridharswiss.github.io/genzcareers/future.html" target="view" class="nav-item" onclick="closeSidebar()">Future Careers</a>
                <a href="https://sridharswiss.github.io/genzcareers/future2030.html" target="view" class="nav-item" onclick="closeSidebar()">Horizon 2030</a>
                <a href="https://sridharswiss.github.io/genzcareers/aibubble.html" target="view" class="nav-item" onclick="closeSidebar()">AI Bubble</a>
                <a href="https://sridharswiss.github.io/genzcareers/quantumtech.html" target="view" class="nav-item" onclick="closeSidebar()">Quantum Tech</a>
                
                <span class="nav-label">Analytics</span>
                <a href="https://sridharswiss.github.io/genzcareers/TextAnalytics.html" target="view" class="nav-item" onclick="closeSidebar()">Text Analytics</a>
                <a href="https://sridharswiss.github.io/IPL/IPL_Analytics.html" target="view" class="nav-item" onclick="closeSidebar()">IPL Data</a>

                <span class="nav-label">Swiss Intelligence</span>
                <a href="https://sridharswiss.github.io/swiss-info/pension.html" target="view" class="nav-item" onclick="closeSidebar()">Pillar Pension</a>
                <a href="https://sridharswiss.github.io/swiss-info/swiss-edu.html" target="view" class="nav-item" onclick="closeSidebar()">Zurich Edu</a>
                <a href="https://sridharswiss.github.io/RI/EU_AI_ACT.html" target="view" class="nav-item" onclick="closeSidebar()">EU AI Act</a>
                
                <span class="nav-label">Heritage</span>
                <a href="https://sridharswiss.github.io/IndianEpics/ramayan.html" target="view" class="nav-item" onclick="closeSidebar()">Ramayana</a>
            </nav>
        </div>
    </aside>

    <main>
        <div id="welcome" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 text-center">
            <h2 class="text-6xl font-black text-white tracking-tighter mb-4 italic">EXECUTIVE <span class="gradient-text">HUB</span></h2>
            <p class="text-slate-500 text-xs font-mono uppercase tracking-[0.4em]">Initialize Matrix via Sidebar</p>
        </div>

        <iframe name="view" id="content-frame"></iframe>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const frame = document.getElementById('content-frame');
        const welcome = document.getElementById('welcome');

        function toggleSidebar() {
            sidebar.classList.toggle('expanded');
            document.body.classList.toggle('expanded'); // For icon animation
        }

        function closeSidebar() {
            sidebar.classList.remove('expanded');
            document.body.classList.remove('expanded');
            welcome.style.opacity = '0';
            setTimeout(() => welcome.style.display = 'none', 500);
            frame.classList.remove('loaded');
        }

        frame.onload = () => {
            frame.classList.add('loaded');
        };
    </script>
</body>
</html>
